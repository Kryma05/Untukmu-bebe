<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>For Filia Lunae 🌙</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-image: url('jeanne.jpeg');
            background-size: cover; background-position: center;
            height: 100vh; overflow: hidden; display: flex;
            justify-content: center; align-items: center; background-color: #000;
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 1;
        }

        /* Animasi Hujan Hati */
        .heart {
            position: absolute; color: #ff4d6d;
            font-size: 20px; z-index: 2;
            animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(105vh) rotate(360deg); } }

        .container { position: relative; z-index: 10; width: 85%; max-width: 400px; text-align: center; }

        .card {
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px);
            padding: 30px; border-radius: 25px; color: #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: all 0.8s ease;
        }

        h2 { color: #d81b60; margin-bottom: 20px; font-size: 1.4rem; }
        label { display: block; text-align: left; font-size: 0.85rem; font-weight: bold; margin-bottom: 8px; color: #555; }
        
        input, select {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border: 1px solid #ddd; border-radius: 12px; font-size: 1rem;
        }

        button {
            width: 100%; padding: 15px; border: none; border-radius: 50px;
            background: linear-gradient(45deg, #d81b60, #ff4d6d);
            color: white; font-weight: bold; font-size: 1rem; cursor: pointer;
        }

        .hidden { opacity: 0; transform: scale(0.8); pointer-events: none; position: absolute; }
        
        .moon-icon { font-size: 60px; margin: 15px 0; display: block; animation: float 3s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .nickname { color: #d81b60; font-weight: bold; font-size: 1.8rem; }
        
        .gif-container img { width: 120px; border-radius: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <audio id="mySong" loop>
        <source src="musik.mp3" type="audio/mp3">
    </audio>

    <div class="container">
        <div class="card" id="form-card">
            <h2> Form menyerahkan hidupmu 💖</h2>
            <label>Nama orang tercantik sedunia?</label>
            <input type="text" id="name" placeholder="Isi nama kamu..." required>

            <label>Janji bakalan bareng terus?</label>
            <input type="text" id="promise" placeholder="Jawab 'Janji'..." required>

            <button onclick="submitForm()">Ajukan Nama </button>
        </div>

        <div class="card hidden" id="result-card">
            <h2 id="greet"></h2>
            
            <div class="gif-container">
                <img src="lucu.gif" alt="Cute GIF">
            </div>

            <p id="display-message" style="line-height: 1.6; color: #444;"></p>
            <span class="moon-icon">🌙</span>
            <p class="nickname">"Bulanku"</p>
        </div>
    </div>

    <script>
        // Hujan Hati
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart'); heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);

        function submitForm() {
            const name = document.getElementById('name').value;
            const promise = document.getElementById('promise').value;
            const song = document.getElementById('mySong');

            if (!name || !promise) {
                alert("Isi dulu formulirnya sayang.. 😊");
                return;
            }

            // PUTAR LAGU
            song.play();

            // TRANSISI TAMPILAN
            document.getElementById('form-card').classList.add('hidden');
            
            setTimeout(() => {
                document.getElementById('result-card').classList.remove('hidden');
                document.getElementById('greet').innerText = `I Love You, ${name}!`;
                document.getElementById('display-message').innerText = `Maacii udah janji ${promise} cantikku. kamu adalah milik dede selama-lamanyaaaa luvvv`;
            }, 600);
        }
    </script>
</body>
</html>
